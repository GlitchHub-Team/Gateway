version: 2

run:
  timeout: 5m
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    - gocyclo
    - staticcheck
    - errcheck
    - govet
    - unused
    - bodyclose
    - noctx
    - revive
    - gosimple
    - asasalint

linters-settings:
  gocyclo:
    min-complexity: 15
  revive:
    confidence: 0.8