name: CI

on:
  push:
    branches:
      - main
      - 'issue-*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: self-hosted
    env:
      NATS_HOST: ${{ vars.NATS_HOST }}
      NATS_PORT: ${{ vars.NATS_PORT }}
      NATS_HTTP_PORT: ${{ vars.NATS_HTTP_PORT }}
      NATS_ENCRYPTION_KEY: ${{ secrets.NATS_ENCRYPTION_KEY }}
      NATS_SYS_ACCOUNT_ID: ${{ vars.NATS_SYS_ACCOUNT_ID }}
      NATS_APPLICATION_CORE_ID: ${{ vars.NATS_APPLICATION_CORE_ID }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      GATEWAY_BASE_CREDS_PATH: base.creds
      TEST_CREDS_PATH: admin_test.creds
      CA_PEM_PATH: ca.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Setup Go tools
        shell: bash
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Start Infrastructure
        uses: GlitchHub-Team/Infrastructure/.github/actions/start@main
        with:
          NATS_STREAM_SETUPPER_CREDS: ${{ secrets.NATS_STREAM_SETUPPER_CREDS }}
          NATS_SERVER_TLS_KEY: ${{ secrets.NATS_SERVER_TLS_KEY }}

      - name: Init integration credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.GATEWAY_BASE_CREDS }}" ]; then
            echo "::error::Missing secret GATEWAY_BASE_CREDS"
            exit 1
          fi

          if [ -z "${{ secrets.TEST_CREDS }}" ]; then
            echo "::error::Missing secret TEST_CREDS"
            exit 1
          fi

          mkdir -p cmd

          printf '%s\n' "${{ secrets.GATEWAY_BASE_CREDS }}" > cmd/base.creds
          printf '%s\n' "${{ secrets.TEST_CREDS }}" > cmd/admin_test.creds

          chmod 600 cmd/base.creds cmd/admin_test.creds

      - name: Go checks (root module)
        shell: bash
        run: |
          set -euo pipefail
          gofumpt -w .
          golangci-lint run
          go test ./...
          cd cmd
          go build .

      - name: Stop
        if: always()
        uses: GlitchHub-Team/Infrastructure/.github/actions/stop@main

      

      
